<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Excel Agent{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#effaf8",
              100: "#d9f3ee",
              500: "#11998e",
              600: "#0f8179",
              700: "#0e6e67"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(0, 0, 0, 0.08)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-brand-50 text-slate-800">
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <div>
        <h1 class="text-xl font-bold tracking-tight text-slate-900">Excel Analysis Agent</h1>
        <p class="text-sm text-slate-500">Django + Ollama + SQLite + DataFrame + Tools</p>
      </div>
      <nav class="flex gap-2 text-sm">
        <a href="/upload" class="rounded-lg px-3 py-2 font-medium hover:bg-slate-100">Upload</a>
        <a href="/chat" class="rounded-lg px-3 py-2 font-medium hover:bg-slate-100">Chat</a>
        <a href="/visualization" class="rounded-lg px-3 py-2 font-medium hover:bg-slate-100">Visualization</a>
        <a href="/settings" class="rounded-lg px-3 py-2 font-medium hover:bg-slate-100">Settings</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
    {% block content %}{% endblock %}
  </main>

  <script>
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return "";
    }
    window.CSRF_TOKEN = getCookie("csrftoken");
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
